version: '3.8'
services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/miniconda:1-3
    build:
      context: .
      dockerfile: Dockerfile.dev
    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity
    volumes:
      - .:/workspace/bd-notebooks-module:cached
      - ${HOME}/.m2:/home/vscode/.m2
      - ${HOME}/.ivy2:/home/vscode/.ivy2
      - sandbox_apps_path:/apps
    ports:
      - "5000:5000" # Example port forwarding
    # depends_on:
    #   - mysqlserver
    extra_hosts:
      - docker.sandbox.net:172.18.0.1
    # Runs app on the same network as the database container, allows "forwardPorts" in devcontainer.json function.
    #network_mode: service:mysqlserver
    network_mode: "sandbox.net"
    # [Optional] Required for ptrace-based debuggers like C++, Go, and Rust
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

  #
  # Mysql Server
  #
  mysqlserver:
    image: mysql:8.0.33
    container_name: mysqlserver
    hostname: mysqlserver.sandbox.net
    restart: always
    ports:
      - "3306:3306"
    command: "mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci"
    volumes:
      - sandbox_apps_path:/apps
      - sandbox_mysql_data:/var/lib/mysql
      - ./conf/mysql:/etc/mysql/conf.d
    user: root
    secrets:
      - mysql-root-password
    env_file:
      - ./conf/mysql/envvars
    healthcheck:
      test: ["CMD", 'mysqladmin', 'ping', '-h', 'localhost', '-u', '$$MYSQL_ADMIN_USER', '-p$$MYSQL_ADMIN_PASSWORD' ]
      interval: 10s
      timeout: 20s
      retries: 10
    extra_hosts:
      - docker.sandbox.net:172.18.0.1

#
# Docker Secrets
#
secrets:
  mysql-root-password:
    file: ./conf/mysql/password.txt
#
# Docker Volumes
#
volumes:
  #
  sandbox_apps_path:
    external: true
  #  
  sandbox_security_secrets:
    external: true
  #  
  sandbox_mysql_data:
    external: true
#
# Docker Networks
#
networks:
  default:
    external: true
    driver: bridge
    name: sandbox.net
